name: Publish Docs

on:
  push:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Run CI Task
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: /bin/bash -c "npm install && npm run build"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx wrangler pages deploy ./build \
            --project-name=varavel-ui \
            --branch="${{ github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message }}")

          # Print output for debugging purposes
          echo "$OUTPUT"

          # Extract the deployment URL from the output
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.pages\.dev' | head -n 1)
          if [ -n "$URL" ]; then
            gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
              -f body="🚀 Deployed to Cloudflare Pages! **Preview URL:** $URL"
          else
            echo "Cannot find deployment URL in Wrangler output."
          fi
